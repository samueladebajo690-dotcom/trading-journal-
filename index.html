
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Journal Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.9);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .hidden {
      display: none !important;
    }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 35px;
      backdrop-filter: blur(14px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .tab-btn.active {
      background: var(--primary);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .form-control {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: white;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .main-app {
      max-width: 1400px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 2.2rem;
    }

    .header p {
      color: var(--muted);
      margin-top: 6px;
    }

    .logout-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(14px);
    }

    .metric-label {
      color: var(--muted);
      margin-bottom: 12px;
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 800;
    }

    .green { color: var(--success); }
    .red { color: var(--danger); }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

    .section-title {
      margin-bottom: 18px;
      font-size: 1.2rem;
    }

    textarea.form-control {
      min-height: 100px;
      resize: vertical;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: left;
    }

    th {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .win {
      background: rgba(16,185,129,0.12);
      color: #34d399;
    }

    .loss {
      background: rgba(239,68,68,0.12);
      color: #f87171;
    }

    .delete-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media(max-width: 1100px){
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="auth-wrapper" id="authWrapper">
    <div class="auth-card">
      <h1>📈 Trading Journal</h1>
      <p>Secure your trading data with login access.</p>

      <div class="tabs">
        <button class="tab-btn active" id="loginTab">Login</button>
        <button class="tab-btn" id="registerTab">Register</button>
      </div>

      <form id="authForm">
        <div class="form-group hidden" id="nameGroup">
          <label>Full Name</label>
          <input type="text" class="form-control" id="nameInput">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="emailInput" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="passwordInput" required>
        </div>

        <button class="btn btn-primary" type="submit" id="authBtn">Login</button>
      </form>
    </div>
  </div>

  <div class="main-app hidden" id="mainApp">

    <div class="header">
      <div>
        <h1>📊 Trading Journal Dashboard</h1>
        <p id="welcomeText"></p>
      </div>

      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="dashboard">
      <div class="card">
        <div class="metric-label">Total Trades</div>
        <div class="metric-value" id="totalTrades">0</div>
      </div>

      <div class="card">
        <div class="metric-label">Win Rate</div>
        <div class="metric-value green" id="winRate">0%</div>
      </div>

      <div class="card">
        <div class="metric-label">Net Profit</div>
        <div class="metric-value" id="netProfit">$0</div>
      </div>

      <div class="card">
        <div class="metric-label">Average RR</div>
        <div class="metric-value" id="avgRR">0</div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h2 class="section-title">Add Trade</h2>

        <form id="tradeForm">
          <div class="form-group">
            <label>Pair</label>
            <input type="text" class="form-control" id="pair" required>
          </div>

          <div class="form-group">
            <label>Direction</label>
            <select class="form-control" id="direction">
              <option>Buy</option>
              <option>Sell</option>
            </select>
          </div>

          <div class="form-group">
            <label>Entry Price</label>
            <input type="number" step="0.0001" class="form-control" id="entryPrice" required>
          </div>

          <div class="form-group">
            <label>Stop Loss</label>
            <input type="number" step="0.0001" class="form-control" id="stopLoss" required>
          </div>

          <div class="form-group">
            <label>Take Profit</label>
            <input type="number" step="0.0001" class="form-control" id="takeProfit" required>
          </div>

          <div class="form-group">
            <label>Profit/Loss ($)</label>
            <input type="number" class="form-control" id="profit" required>
          </div>

          <div class="form-group">
            <label>Risk Reward (Auto Calculated)</label>
            <input type="number" step="0.1" class="form-control" id="rr" readonly>
          </div>

          <div class="form-group">
            <label>Upload Screenshot</label>
            <input type="file" class="form-control" id="tradeImage" accept="image/*">
          </div>

          <div class="form-group">
            <label>Date</label>
            <input type="date" class="form-control" id="date" required>
          </div>

          <div class="form-group">
            <label>Notes</label>
            <textarea class="form-control" id="notes"></textarea>
          </div>

          <button class="btn btn-primary" type="submit">Save Trade</button>
        </form>
      </div>

      <div class="card">
        <h2 class="section-title">Trade History</h2>

        <table>
          <thead>
            <tr>
              <th>Pair</th>
              <th>Direction</th>
              <th>Entry</th>
              <th>SL</th>
              <th>TP</th>
              <th>P/L</th>
              <th>RR</th>
              <th>Date</th>
              <th>Status</th>
              <th>Screenshot</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="tradeTable"></tbody>
        </table>

        <div class="empty" id="emptyState">No trades yet.</div>
      </div>
    </div>
  </div>

  <script>
    const authWrapper = document.getElementById('authWrapper');
    const mainApp = document.getElementById('mainApp');

    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const authBtn = document.getElementById('authBtn');
    const nameGroup = document.getElementById('nameGroup');

    const authForm = document.getElementById('authForm');
    const tradeForm = document.getElementById('tradeForm');
    const tradeTable = document.getElementById('tradeTable');
    const emptyState = document.getElementById('emptyState');

    let isLogin = true;

    let users = JSON.parse(localStorage.getItem('users')) || [];
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
    let trades = JSON.parse(localStorage.getItem('trades')) || [];

    loginTab.onclick = () => {
      isLogin = true;
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      nameGroup.classList.add('hidden');
      authBtn.textContent = 'Login';
    }

    registerTab.onclick = () => {
      isLogin = false;
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      nameGroup.classList.remove('hidden');
      authBtn.textContent = 'Register';
    }

    authForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const name = document.getElementById('nameInput').value;
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;

      if (isLogin) {
        const user = users.find(u => u.email === email && u.password === password);

        if (!user) {
          alert('Invalid login credentials');
          return;
        }

        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(user));

        openApp();
      } else {
        const exists = users.some(u => u.email === email);

        if (exists) {
          alert('User already exists');
          return;
        }

        const newUser = { name, email, password };
        users.push(newUser);

        localStorage.setItem('users', JSON.stringify(users));
        alert('Registration successful. Login now.');

        loginTab.click();
      }
    });

    function openApp() {
      authWrapper.classList.add('hidden');
      mainApp.classList.remove('hidden');

      document.getElementById('welcomeText').textContent = `Welcome back, ${currentUser.name || currentUser.email}`;

      renderTrades();
      updateStats();
    }

    function renderTrades() {
      tradeTable.innerHTML = '';

      const userTrades = trades.filter(t => t.user === currentUser.email);

      emptyState.style.display = userTrades.length ? 'none' : 'block';

      userTrades.reverse().forEach((trade, index) => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${trade.pair}</td>
          <td>${trade.direction}</td>
          <td>${trade.entry}</td>
          <td>${trade.sl}</td>
          <td>${trade.tp}</td>
          <td class="${trade.profit >= 0 ? 'green' : 'red'}">$${trade.profit}</td>
          <td>${trade.rr}</td>
          <td>${trade.date}</td>
          <td>
            <span class="badge ${trade.profit >= 0 ? 'win' : 'loss'}">
              ${trade.profit >= 0 ? 'WIN' : 'LOSS'}
            </span>
          </td>
          <td>
            ${trade.image ? `<a href="${trade.image}" target="_blank" class="green">View</a>` : 'None'}
          </td>
          <td>
            <button class="delete-btn" onclick="deleteTrade(${trades.indexOf(trade)})">Delete</button>
          </td>
        `;

        tradeTable.appendChild(row);
      });
    }

    function updateStats() {
      const userTrades = trades.filter(t => t.user === currentUser.email);

      const total = userTrades.length;
      const wins = userTrades.filter(t => t.profit > 0).length;
      const net = userTrades.reduce((a,b) => a + Number(b.profit), 0);
      const avgRR = total
        ? (userTrades.reduce((a,b)=>a+Number(b.rr),0)/total).toFixed(2)
        : 0;

      document.getElementById('totalTrades').textContent = total;
      document.getElementById('winRate').textContent = total ? ((wins/total)*100).toFixed(1)+'%' : '0%';

      const netEl = document.getElementById('netProfit');
      netEl.textContent = '$'+net.toFixed(2);
      netEl.className = `metric-value ${net >= 0 ? 'green' : 'red'}`;

      document.getElementById('avgRR').textContent = avgRR;
    }

    tradeForm.addEventListener('submit', (e)=>{
      e.preventDefault();

      const entry = Number(document.getElementById('entryPrice').value);
      const sl = Number(document.getElementById('stopLoss').value);
      const tp = Number(document.getElementById('takeProfit').value);

      const risk = Math.abs(entry - sl);
      const reward = Math.abs(tp - entry);
      const rrCalc = risk ? (reward / risk).toFixed(2) : 0;

      document.getElementById('rr').value = rrCalc;

      const fileInput = document.getElementById('tradeImage');
      const file = fileInput.files[0];

      const saveTrade = (imageData = '') => {
        const trade = {
          user: currentUser.email,
          pair: document.getElementById('pair').value,
          direction: document.getElementById('direction').value,
          entry,
          sl,
          tp,
          profit: Number(document.getElementById('profit').value),
          rr: rrCalc,
          image: imageData,
          date: document.getElementById('date').value,
          notes: document.getElementById('notes').value
        };

        trades.push(trade);
        localStorage.setItem('trades', JSON.stringify(trades));

        document.cookie = `lastTrade=${trade.pair}; max-age=86400; path=/`;

        tradeForm.reset();
        document.getElementById('date').valueAsDate = new Date();

        renderTrades();
        updateStats();
      };

      if(file){
        const reader = new FileReader();
        reader.onload = function(e){
          saveTrade(e.target.result);
        }
        reader.readAsDataURL(file);
      } else {
        saveTrade();
      }
    });

    function deleteTrade(index) {
      trades.splice(index,1);
      localStorage.setItem('trades', JSON.stringify(trades));
      renderTrades();
      updateStats();
    }

    document.getElementById('logoutBtn').onclick = () => {
      localStorage.removeItem('currentUser');
      location.reload();
    }

    document.getElementById('date').valueAsDate = new Date();

    if(currentUser){
      openApp();
    }
  </script>
</body>
</html>
